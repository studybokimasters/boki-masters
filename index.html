<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ホーム</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>

<body>

  <div class="header compact-header">
    <div class="header-inner compact-header-inner">
      <div class="topbar-row">
        <div class="level-switch">
          <button id="level3Btn" onclick="setLevel('3級')">3級</button>
          <button id="level2Btn" onclick="setLevel('2級')">2級</button>
        </div>
      </div>

      <div class="page-heading compact-page-heading">
        <h2 class="page-title">学習ダッシュボード</h2>
      </div>
    </div>
  </div>

  <div class="container">

    <div class="card main-progress-card">
      <div class="main-progress-head">
        <h3>今日の進捗</h3>
        <div id="todayGoalText" class="main-progress-value">0 / 120分</div>
      </div>

      <div class="progress-bar large">
        <div id="todayGoalFill"></div>
      </div>
    </div>

    <div class="grid">

      <div class="card">
        <h3>今週の進捗</h3>
        <p id="weeklyProgressText" class="card-value">0時間0分 / 10時間（0%）</p>

        <div class="progress-bar">
          <div id="progressFill"></div>
        </div>
      </div>

      <div class="card streak-card">
        <h3>連続日数</h3>
        <p id="streak" class="streak-value">0日連続</p>
      </div>

      <div class="card">
        <h3>累計時間</h3>
        <p id="totalTime" class="card-value">0時間0分</p>
      </div>

      <div class="card">
        <h3>試験まで</h3>
        <p id="countdown" class="card-value">未設定</p>

        <div class="inline-form" style="margin-top: 14px;">
          <input type="date" id="examDate">
          <button onclick="saveExamDate()">保存</button>
        </div>
      </div>

    </div>
  </div>

  <div class="nav">
    <a href="index.html" data-page="index.html" aria-label="ホーム">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path
          d="M4.5 10.5L12 4.2L19.5 10.5V19.5H15V14.2H9V19.5H4.5V10.5Z"
          style="fill: currentColor !important; stroke: none !important;"
        ></path>
      </svg>
      <span>ホーム</span>
    </a>

    <a href="practice.html" data-page="practice.html" aria-label="練習">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path
          d="M7 4.5H14.5L18 8V19.5H7V4.5Z"
          style="fill: none !important; stroke: currentColor !important; stroke-width: 2 !important; stroke-linecap: round !important; stroke-linejoin: round !important;"
        ></path>
        <path
          d="M14.5 4.5V8H18"
          style="fill: none !important; stroke: currentColor !important; stroke-width: 2 !important; stroke-linecap: round !important; stroke-linejoin: round !important;"
        ></path>
        <path
          d="M9.5 12.5H14.5"
          style="fill: none !important; stroke: currentColor !important; stroke-width: 2 !important; stroke-linecap: round !important;"
        ></path>
        <path
          d="M9.5 16H13"
          style="fill: none !important; stroke: currentColor !important; stroke-width: 2 !important; stroke-linecap: round !important;"
        ></path>
      </svg>
      <span>練習</span>
    </a>

    <a href="record.html" data-page="record.html" aria-label="記録">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <rect
          x="5.5"
          y="11"
          width="3"
          height="8"
          rx="1.2"
          style="fill: none !important; stroke: currentColor !important; stroke-width: 2 !important;"
        ></rect>
        <rect
          x="10.5"
          y="5"
          width="3"
          height="14"
          rx="1.2"
          style="fill: none !important; stroke: currentColor !important; stroke-width: 2 !important;"
        ></rect>
        <rect
          x="15.5"
          y="8"
          width="3"
          height="11"
          rx="1.2"
          style="fill: none !important; stroke: currentColor !important; stroke-width: 2 !important;"
        ></rect>
      </svg>
      <span>記録</span>
    </a>

    <a href="tasks.html" data-page="tasks.html" aria-label="やること">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path
          d="M6.5 7.8L8.2 9.5L11.2 6.2"
          style="fill: none !important; stroke: currentColor !important; stroke-width: 2 !important; stroke-linecap: round !important; stroke-linejoin: round !important;"
        ></path>
        <path
          d="M13 8H18.5"
          style="fill: none !important; stroke: currentColor !important; stroke-width: 2 !important; stroke-linecap: round !important;"
        ></path>
        <path
          d="M6.5 15L8.2 16.7L11.2 13.4"
          style="fill: none !important; stroke: currentColor !important; stroke-width: 2 !important; stroke-linecap: round !important; stroke-linejoin: round !important;"
        ></path>
        <path
          d="M13 15.2H18.5"
          style="fill: none !important; stroke: currentColor !important; stroke-width: 2 !important; stroke-linecap: round !important;"
        ></path>
      </svg>
      <span>やること</span>
    </a>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const currentPage = location.pathname.split("/").pop() || "index.html";

      document.querySelectorAll(".nav a").forEach((link) => {
        link.classList.toggle("active", link.dataset.page === currentPage);
      });
    });
  </script>

  <script src="questions.js"></script>
  <script src="app.js"></script>

</body>
</html>
