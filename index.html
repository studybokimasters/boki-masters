<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ホーム</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>

  <div class="header compact-header">
    <div class="header-inner compact-header-inner">
      <div class="topbar-row">
        <div class="level-switch">
          <button id="level3Btn" onclick="setLevel('3級')">3級</button>
          <button id="level2Btn" onclick="setLevel('2級')">2級</button>
        </div>
      </div>

      <div class="page-heading compact-page-heading">
        <h2 class="page-title">学習ダッシュボード</h2>
      </div>
    </div>
  </div>

  <div class="container">

    <!-- 主役 -->
    <div class="card main-progress-card">
      <div class="main-progress-head">
        <h3>今日の進捗</h3>
        <div id="todayGoalText" class="main-progress-value">0 / 120分</div>
      </div>
      <div class="progress-bar large">
        <div id="todayGoalFill"></div>
      </div>
    </div>

    <!-- サブ情報 -->
    <div class="grid">
      <div class="card">
        <h3>今週の進捗</h3>
        <p id="weeklyProgressText" class="card-value">0時間0分 / 10時間（0%）</p>
        <div class="progress-bar">
          <div id="progressFill"></div>
        </div>
      </div>

      <div class="card streak-card">
        <h3>連続日数</h3>
        <p id="streak" class="streak-value">0日連続</p>
      </div>

      <div class="card">
        <h3>累計時間</h3>
        <p id="totalTime" class="card-value">0時間0分</p>
      </div>

      <div class="card">
        <h3>試験まで</h3>
        <p id="countdown" class="card-value">未設定</p>

        <div class="inline-form" style="margin-top: 14px;">
          <input type="date" id="examDate">
          <button onclick="saveExamDate()">保存</button>
        </div>
      </div>
    </div>
  </div>

  <div class="nav">
    <a href="index.html" class="active">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M3 10.5 12 3l9 7.5v9.5a1 1 0 0 1-1 1h-5.5v-6h-5v6H4a1 1 0 0 1-1-1z"/>
      </svg>
      <span>ホーム</span>
    </a>

    <a href="practice.html">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M6 3h9l5 5v13a1 1 0 0 1-1 1H6a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2zm8 1.5V9h4.5"/>
        <path d="M8 13h8M8 17h5" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      </svg>
      <span>練習</span>
    </a>

    <a href="record.html">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M5 20V10m7 10V4m7 16v-7" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
      </svg>
      <span>記録</span>
    </a>

    <a href="tasks.html">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M9 4h6m-9 4h12M6 12h12M6 16h8" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M4 4h1M4 8h1M4 12h1M4 16h1" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
      </svg>
      <span>やること</span>
    </a>
  </div>

  <script src="questions.js"></script>
  <script src="app.js"></script>
</body>
</html>
