<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ホーム</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>

  <div class="header compact-header">
    <div class="header-inner compact-header-inner">
      <div class="topbar-row">
        <div class="level-switch">
          <button id="level3Btn" onclick="setLevel('3級')">3級</button>
          <button id="level2Btn" onclick="setLevel('2級')">2級</button>
        </div>
      </div>

      <div class="page-heading compact-page-heading">
        <h2 class="page-title">学習ダッシュボード</h2>
      </div>
    </div>
  </div>

  <div class="container">

    <!-- 主役 -->
    <div class="card main-progress-card">
      <div class="main-progress-head">
        <h3>今日の進捗</h3>
        <div id="todayGoalText" class="main-progress-value">0 / 120分</div>
      </div>
      <div class="progress-bar large">
        <div id="todayGoalFill"></div>
      </div>
    </div>

    <!-- サブ情報 -->
    <div class="grid">
      <div class="card">
        <h3>今週の進捗</h3>
        <p id="weeklyProgressText" class="card-value">0時間0分 / 10時間（0%）</p>
        <div class="progress-bar">
          <div id="progressFill"></div>
        </div>
      </div>

      <div class="card streak-card">
        <h3>連続日数</h3>
        <p id="streak" class="streak-value">0日連続</p>
      </div>

      <div class="card">
        <h3>累計時間</h3>
        <p id="totalTime" class="card-value">0時間0分</p>
      </div>

      <div class="card">
        <h3>試験まで</h3>
        <p id="countdown" class="card-value">未設定</p>

        <div class="inline-form" style="margin-top: 14px;">
          <input type="date" id="examDate">
          <button onclick="saveExamDate()">保存</button>
        </div>
      </div>
    </div>
  </div>

  <div class="nav">
  <a href="index.html" data-page="index.html" aria-label="ホーム">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M4.5 10.5L12 4.2L19.5 10.5V19.5H15V14.2H9V19.5H4.5V10.5Z"></path>
    </svg>
    <span>ホーム</span>
  </a>

  <a href="practice.html" data-page="practice.html" aria-label="練習">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M7 4.5H14.5L18 8V19.5H7V4.5Z"></path>
      <path d="M14.5 4.5V8H18"></path>
      <path d="M9.5 12.5H14.5"></path>
      <path d="M9.5 16H13"></path>
    </svg>
    <span>練習</span>
  </a>

  <a href="record.html" data-page="record.html" aria-label="記録">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M6.5 19V12"></path>
      <path d="M12 19V6"></path>
      <path d="M17.5 19V9.5"></path>
    </svg>
    <span>記録</span>
  </a>

  <a href="tasks.html" data-page="tasks.html" aria-label="やること">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M6.5 7.5L8.2 9.2L11 6.2"></path>
      <path d="M13 8H18"></path>
      <path d="M6.5 14.5L8.2 16.2L11 13.2"></path>
      <path d="M13 15H18"></path>
    </svg>
    <span>やること</span>
  </a>
</div>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const currentPage = location.pathname.split("/").pop() || "index.html";

    document.querySelectorAll(".nav a").forEach((link) => {
      link.classList.toggle("active", link.dataset.page === currentPage);
    });
  });
</script>

  <script src="questions.js"></script>
  <script src="app.js"></script>
</body>
</html>
