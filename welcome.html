<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>簿記マスターズ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="welcome-page-body">

  <main class="welcome-page">

    <!-- 1画面目：画像だけ -->
    <section class="welcome-hero-section" aria-label="簿記マスターズ メインビジュアル">
      <div class="welcome-hero-overlay"></div>
      <div class="welcome-hero-fade"></div>
    </section>

    <!-- 2画面目：説明＋導線 -->
    <section class="welcome-info-section" id="welcome-info">
      <div class="welcome-info-container">

        <div class="welcome-info-left">
          <div class="welcome-info-badge">ABOUT</div>
          <h2 class="welcome-info-title">簿記学習を、<br>続けやすくする。</h2>
          <p class="welcome-info-text">
            学習記録、問題演習、復習、やること管理。<br>
            毎日の学習を止めないための簿記アプリです。
          </p>

          <div class="welcome-feature-list">
            <div class="welcome-feature-item">
              <strong>学習記録を見える化</strong>
              <span>勉強時間と進捗をひと目で把握</span>
            </div>

            <div class="welcome-feature-item">
              <strong>苦手分野を把握</strong>
              <span>分野別演習と復習で弱点を整理</span>
            </div>

            <div class="welcome-feature-item">
              <strong>毎日の継続を支える</strong>
              <span>やること管理で迷わず学習を始められる</span>
            </div>
          </div>
        </div>

        <div class="welcome-info-right">
          <div class="welcome-auth-card">
            <div class="welcome-auth-head">
              <h3>利用をはじめる</h3>
              <p>アカウント作成で学習データを保存できます</p>
            </div>

            <div class="welcome-auth-actions">
              <a href="signup.html" class="welcome-auth-btn primary">新規登録</a>
              <a href="login.html" class="welcome-auth-btn secondary">ログイン</a>
              <a href="index.html" class="welcome-auth-btn ghost">ゲストで試す</a>
            </div>

            <div class="welcome-auth-note">
              ゲストで試してから、あとで登録することもできます。
            </div>
          </div>
        </div>

      </div>
    </section>

  </main>

</body>
</html>
